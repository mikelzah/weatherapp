<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Дата и погода</title>

<!-- iOS: запуск как полноценное веб-приложение с домашнего экрана -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Погода">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f2027">
<link rel="manifest" href="manifest.json">

<style>
  :root {
    color-scheme: dark;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overscroll-behavior: none;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(180deg, #1e3c72 0%, #2a5298 45%, #16222a 100%);
    color: #fff;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-user-select: none;
    user-select: none;
    transition: background 0.8s ease;
  }

  .top-bar {
    display: flex;
    justify-content: flex-end;
    padding: 14px 18px 0;
  }
  .refresh-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
  }
  .refresh-btn:active { background: rgba(255,255,255,0.3); }
  .refresh-btn.spinning { animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 24px;
    gap: 6px;
  }

  .date-block { margin-bottom: 28px; }
  .weekday {
    font-size: 22px;
    font-weight: 600;
    opacity: 0.9;
    text-transform: capitalize;
  }
  .full-date {
    font-size: 16px;
    opacity: 0.65;
    margin-top: 4px;
    text-transform: capitalize;
  }
  .clock {
    font-size: 15px;
    opacity: 0.5;
    margin-top: 8px;
    font-variant-numeric: tabular-nums;
  }

  .weather-icon { font-size: 78px; line-height: 1; margin-bottom: 4px; }
  .temp {
    font-size: 96px;
    font-weight: 200;
    line-height: 1;
    letter-spacing: -2px;
  }
  .temp-feels {
    font-size: 15px;
    opacity: 0.65;
    margin-top: 4px;
  }
  .desc {
    font-size: 19px;
    font-weight: 500;
    margin-top: 10px;
  }
  .hi-lo {
    font-size: 15px;
    opacity: 0.7;
    margin-top: 6px;
  }
  .location {
    font-size: 16px;
    opacity: 0.8;
    margin-top: 18px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .status {
    font-size: 14px;
    opacity: 0.7;
    max-width: 280px;
  }

  .city-search {
    display: none;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 320px;
  }
  .city-search.visible { display: flex; }
  .city-search input {
    font-size: 17px;
    padding: 12px 14px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: #fff;
    outline: none;
  }
  .city-search input::placeholder { color: rgba(255,255,255,0.5); }
  .city-search button {
    font-size: 16px;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #fff;
    color: #16222a;
    font-weight: 600;
  }
  .city-results {
    text-align: left;
    max-height: 160px;
    overflow-y: auto;
  }
  .city-results div {
    padding: 10px 12px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    margin-top: 6px;
    font-size: 15px;
  }
  .city-results div:active { background: rgba(255,255,255,0.2); }

  .link-btn {
    background: none;
    border: none;
    color: #8ecbff;
    font-size: 14px;
    margin-top: 10px;
  }

  footer {
    text-align: center;
    font-size: 11px;
    opacity: 0.35;
    padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
  }
</style>
</head>
<body>

<div class="top-bar">
  <button class="refresh-btn" id="refreshBtn" aria-label="Обновить">&#8635;</button>
</div>

<main>
  <div class="date-block">
    <div class="weekday" id="weekday">&nbsp;</div>
    <div class="full-date" id="fullDate">&nbsp;</div>
    <div class="clock" id="clock">&nbsp;</div>
  </div>

  <div id="weatherView">
    <div class="weather-icon" id="weatherIcon">🌡️</div>
    <div class="temp" id="temp">--°</div>
    <div class="temp-feels" id="feels"></div>
    <div class="desc" id="desc">Определяем погоду…</div>
    <div class="hi-lo" id="hiLo"></div>
    <div class="location" id="location"></div>
  </div>

  <div class="status" id="status"></div>

  <div class="city-search" id="citySearch">
    <input type="text" id="cityInput" placeholder="Введите город" autocapitalize="words" autocorrect="off">
    <button id="citySearchBtn">Найти</button>
    <div class="city-results" id="cityResults"></div>
  </div>

  <button class="link-btn" id="manualBtn" style="display:none;">Ввести город вручную</button>
</main>

<footer>Данные о погоде: Open-Meteo</footer>

<script>
(function () {
  const weekdayEl = document.getElementById('weekday');
  const fullDateEl = document.getElementById('fullDate');
  const clockEl = document.getElementById('clock');
  const tempEl = document.getElementById('temp');
  const feelsEl = document.getElementById('feels');
  const descEl = document.getElementById('desc');
  const hiLoEl = document.getElementById('hiLo');
  const iconEl = document.getElementById('weatherIcon');
  const locationEl = document.getElementById('location');
  const statusEl = document.getElementById('status');
  const refreshBtn = document.getElementById('refreshBtn');
  const manualBtn = document.getElementById('manualBtn');
  const citySearch = document.getElementById('citySearch');
  const cityInput = document.getElementById('cityInput');
  const citySearchBtn = document.getElementById('citySearchBtn');
  const cityResults = document.getElementById('cityResults');
  const weatherView = document.getElementById('weatherView');

  const WEEKDAYS = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

  // WMO weather code -> [emoji, description, gradient]
  const WMO = {
    0:  ['☀️', 'Ясно', ['#2980b9', '#6dd5fa']],
    1:  ['🌤️', 'Малооблачно', ['#2980b9', '#6dd5fa']],
    2:  ['⛅', 'Переменная облачность', ['#556270', '#4ecdc4']],
    3:  ['☁️', 'Пасмурно', ['#485563', '#29323c']],
    45: ['🌫️', 'Туман', ['#606c88', '#3f4c6b']],
    48: ['🌫️', 'Изморозь', ['#606c88', '#3f4c6b']],
    51: ['🌦️', 'Слабая морось', ['#4b6cb7', '#182848']],
    53: ['🌦️', 'Морось', ['#4b6cb7', '#182848']],
    55: ['🌧️', 'Сильная морось', ['#4b6cb7', '#182848']],
    56: ['🌧️', 'Ледяная морось', ['#4b6cb7', '#182848']],
    57: ['🌧️', 'Сильная ледяная морось', ['#4b6cb7', '#182848']],
    61: ['🌧️', 'Небольшой дождь', ['#3a6073', '#16222a']],
    63: ['🌧️', 'Дождь', ['#3a6073', '#16222a']],
    65: ['🌧️', 'Сильный дождь', ['#232526', '#414345']],
    66: ['🌧️', 'Ледяной дождь', ['#3a6073', '#16222a']],
    67: ['🌧️', 'Сильный ледяной дождь', ['#232526', '#414345']],
    71: ['🌨️', 'Небольшой снег', ['#83a4d4', '#b6fbff']],
    73: ['🌨️', 'Снег', ['#83a4d4', '#b6fbff']],
    75: ['❄️', 'Сильный снег', ['#5c7a99', '#c9d6df']],
    77: ['❄️', 'Снежная крупа', ['#5c7a99', '#c9d6df']],
    80: ['🌦️', 'Небольшой ливень', ['#3a6073', '#16222a']],
    81: ['🌧️', 'Ливень', ['#3a6073', '#16222a']],
    82: ['⛈️', 'Сильный ливень', ['#232526', '#0f2027']],
    85: ['🌨️', 'Небольшой снегопад', ['#83a4d4', '#b6fbff']],
    86: ['❄️', 'Сильный снегопад', ['#5c7a99', '#c9d6df']],
    95: ['⛈️', 'Гроза', ['#232526', '#0f2027']],
    96: ['⛈️', 'Гроза с градом', ['#232526', '#0f2027']],
    99: ['⛈️', 'Сильная гроза с градом', ['#232526', '#0f2027']],
  };

  function updateClock() {
    const now = new Date();
    weekdayEl.textContent = WEEKDAYS[now.getDay()];
    fullDateEl.textContent = `${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
    clockEl.textContent = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 1000);

  function setStatus(msg) { statusEl.textContent = msg || ''; }

  function applyWeather(data, placeName) {
    const cw = data.current_weather;
    const code = cw.weathercode;
    const info = WMO[code] || ['🌡️', 'Неизвестно', ['#2a5298', '#16222a']];
    const [emoji, description, gradient] = info;

    tempEl.textContent = Math.round(cw.temperature) + '°';
    iconEl.textContent = emoji;
    descEl.textContent = description;
    document.body.style.background = `linear-gradient(180deg, ${gradient[0]} 0%, ${gradient[1]} 100%)`;

    if (data.hourly && data.hourly.apparent_temperature) {
      const hourKey = cw.time.slice(0, 13) + ':00';
      const idx = data.hourly.time.indexOf(hourKey);
      if (idx !== -1) {
        const feels = Math.round(data.hourly.apparent_temperature[idx]);
        feelsEl.textContent = `Ощущается как ${feels}°`;
      }
    }

    if (data.daily) {
      const hi = Math.round(data.daily.temperature_2m_max[0]);
      const lo = Math.round(data.daily.temperature_2m_min[0]);
      hiLoEl.textContent = `Макс. ${hi}° / Мин. ${lo}°`;
    }

    locationEl.innerHTML = placeName ? `📍 ${placeName}` : '';
    weatherView.style.display = '';
    setStatus('');
  }

  function fetchWeather(lat, lon, placeName) {
    setStatus('Загружаем погоду…');
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=apparent_temperature&daily=temperature_2m_max,temperature_2m_min&timezone=auto`;
    return fetch(url)
      .then(r => { if (!r.ok) throw new Error('weather_http_' + r.status); return r.json(); })
      .then(data => {
        if (placeName) {
          applyWeather(data, placeName);
        } else {
          reverseGeocode(lat, lon).then(name => applyWeather(data, name));
        }
      })
      .catch(err => {
        console.error(err);
        setStatus('Не удалось загрузить погоду. Проверьте соединение и повторите.');
      });
  }

  function reverseGeocode(lat, lon) {
    return fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ru`)
      .then(r => r.ok ? r.json() : null)
      .then(d => (d && (d.city || d.locality)) || null)
      .catch(() => null);
  }

  function locate() {
    setStatus('Определяем местоположение…');
    manualBtn.style.display = 'none';
    citySearch.classList.remove('visible');

    if (!('geolocation' in navigator)) {
      setStatus('Геолокация недоступна в этом браузере.');
      manualBtn.style.display = '';
      return;
    }

    navigator.geolocation.getCurrentPosition(
      pos => fetchWeather(pos.coords.latitude, pos.coords.longitude),
      err => {
        console.warn(err);
        setStatus('Доступ к геолокации не получен. Можно ввести город вручную.');
        manualBtn.style.display = '';
      },
      { enableHighAccuracy: false, timeout: 10000, maximumAge: 5 * 60 * 1000 }
    );
  }

  function searchCity(query) {
    cityResults.innerHTML = '';
    if (!query || query.length < 2) return;
    fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5&language=ru&format=json`)
      .then(r => r.json())
      .then(data => {
        cityResults.innerHTML = '';
        (data.results || []).forEach(res => {
          const div = document.createElement('div');
          const region = [res.admin1, res.country].filter(Boolean).join(', ');
          div.textContent = region ? `${res.name} (${region})` : res.name;
          div.addEventListener('click', () => {
            citySearch.classList.remove('visible');
            manualBtn.style.display = '';
            fetchWeather(res.latitude, res.longitude, res.name);
          });
          cityResults.appendChild(div);
        });
        if (!data.results || !data.results.length) {
          cityResults.innerHTML = '<div style="opacity:.6">Ничего не найдено</div>';
        }
      });
  }

  manualBtn.addEventListener('click', () => {
    citySearch.classList.toggle('visible');
  });
  citySearchBtn.addEventListener('click', () => searchCity(cityInput.value.trim()));
  cityInput.addEventListener('keydown', e => { if (e.key === 'Enter') searchCity(cityInput.value.trim()); });

  refreshBtn.addEventListener('click', () => {
    refreshBtn.classList.add('spinning');
    locate();
    setTimeout(() => refreshBtn.classList.remove('spinning'), 900);
  });

  locate();
})();
</script>
</body>
</html>
