<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Дата и погода</title>

<!-- iOS: запуск как полноценное веб-приложение с домашнего экрана -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Погода">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f2027">
<link rel="manifest" href="manifest.json">

<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overscroll-behavior: none;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(180deg, #1e3c72 0%, #2a5298 45%, #16222a 100%);
    color: #fff;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-user-select: none;
    user-select: none;
    transition: background 0.8s ease;
    overflow: hidden;
    position: relative;
  }

  #bgCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .top-bar, .pager, .dots, footer { position: relative; z-index: 1; }

  .top-bar {
    display: flex;
    justify-content: flex-end;
    padding: 14px 18px 0;
    flex: 0 0 auto;
  }
  .notify-btn, .refresh-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
  }
  .notify-btn { margin-right: 8px; }
  .notify-btn:active, .refresh-btn:active { background: rgba(255,255,255,0.3); }
  .refresh-btn.spinning { animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .pager {
    flex: 1;
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .pager::-webkit-scrollbar { display: none; }

  .page {
    flex: 0 0 100%;
    min-width: 100%;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 24px;
  }

  .weekday { font-size: 22px; font-weight: 600; opacity: 0.9; text-transform: capitalize; }
  .full-date { font-size: 16px; opacity: 0.65; margin-top: 4px; text-transform: capitalize; }
  .clock { font-size: 15px; opacity: 0.5; margin-top: 8px; font-variant-numeric: tabular-nums; }

  .weather-body { margin-top: 26px; }
  .weather-icon { font-size: 72px; line-height: 1; margin-bottom: 4px; }
  .temp { font-size: 88px; font-weight: 200; line-height: 1; letter-spacing: -2px; }
  .temp-feels { font-size: 15px; opacity: 0.65; margin-top: 4px; min-height: 18px; }
  .desc { font-size: 19px; font-weight: 500; margin-top: 10px; }
  .hi-lo { font-size: 15px; opacity: 0.7; margin-top: 6px; }

  .forecast-strip {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    width: 100%;
    max-width: 340px;
    margin-top: 22px;
    padding-bottom: 4px;
  }
  .forecast-strip::-webkit-scrollbar { display: none; }
  .forecast-card {
    flex: 0 0 auto;
    background: rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 10px 12px;
    min-width: 56px;
    backdrop-filter: blur(6px);
  }
  .fc-day { font-size: 12px; opacity: .75; margin-bottom: 4px; }
  .fc-icon { font-size: 20px; }
  .fc-hi { font-size: 14px; font-weight: 600; margin-top: 4px; }
  .fc-lo { font-size: 12px; opacity: .6; }

  .page-footer { margin-top: 20px; display: flex; align-items: center; gap: 10px; flex-direction: column; }
  .location-name { font-size: 16px; opacity: 0.85; }
  .remove-btn {
    background: rgba(255,80,80,0.2);
    color: #ffb3b3;
    border: none;
    border-radius: 10px;
    padding: 6px 14px;
    font-size: 13px;
  }

  .status { font-size: 14px; opacity: 0.7; max-width: 280px; margin-top: 10px; }

  .dots { display: flex; justify-content: center; align-items: center; gap: 7px; padding: 8px 0 4px; flex: 0 0 auto; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.3); }
  .dot.active { background: #fff; }
  .dot-add { border: 1px solid rgba(255,255,255,0.5); background: transparent; }

  .add-page-inner { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 14px; }
  .add-title { font-size: 20px; font-weight: 600; }
  .city-input {
    font-size: 17px;
    padding: 12px 14px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: #fff;
    outline: none;
  }
  .city-input::placeholder { color: rgba(255,255,255,0.5); }
  .city-results {
    text-align: left;
    max-height: 300px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .city-result { padding: 10px 12px; background: rgba(255,255,255,0.08); border-radius: 10px; font-size: 15px; }
  .city-result:active { background: rgba(255,255,255,0.2); }
  .hint { opacity: 0.6; font-size: 14px; padding: 6px 2px; }

  footer {
    text-align: center;
    font-size: 11px;
    opacity: 0.35;
    padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
    flex: 0 0 auto;
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="top-bar">
  <button class="notify-btn" id="notifyBtn" aria-label="Включить уведомления">🔕</button>
  <button class="refresh-btn" id="refreshBtn" aria-label="Обновить">&#8635;</button>
</div>

<div class="pager" id="pager"></div>
<div class="dots" id="dots"></div>

<footer>Данные о погоде: Open-Meteo</footer>

<script src="app.js"></script>
</body>
</html>
